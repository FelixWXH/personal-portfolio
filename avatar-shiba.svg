<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <defs>
    <clipPath id="circle">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>
  
  <!-- 圆形背景 - 蓝色 -->
  <circle cx="16" cy="16" r="16" fill="#3b82f6"/>
  
  <g clip-path="url(#circle)">
    <!-- 耳朵 (左) -->
    <rect x="5" y="2" width="1" height="1" fill="#503020"/>
    <rect x="6" y="1" width="1" height="1" fill="#503020"/>
    <rect x="7" y="1" width="2" height="1" fill="#FFB060"/>
    <rect x="6" y="2" width="3" height="1" fill="#FFB060"/>
    <rect x="6" y="3" width="2" height="1" fill="#FFB060"/>
    <rect x="6" y="4" width="1" height="1" fill="#FFE0C0"/>
    
    <!-- 耳朵 (右) -->
    <rect x="26" y="2" width="1" height="1" fill="#503020"/>
    <rect x="24" y="1" width="1" height="1" fill="#503020"/>
    <rect x="23" y="1" width="2" height="1" fill="#FFB060"/>
    <rect x="23" y="2" width="3" height="1" fill="#FFB060"/>
    <rect x="24" y="3" width="2" height="1" fill="#FFB060"/>
    <rect x="25" y="4" width="1" height="1" fill="#FFE0C0"/>
    
    <!-- 头顶毛发 -->
    <rect x="11" y="3" width="10" height="1" fill="#503020"/>
    <rect x="10" y="4" width="12" height="1" fill="#FFB060"/>
    <rect x="9" y="5" width="14" height="1" fill="#FFB060"/>
    
    <!-- 脸部轮廓 -->
    <rect x="8" y="6" width="16" height="1" fill="#503020"/>
    <rect x="7" y="7" width="18" height="1" fill="#FFB060"/>
    <rect x="7" y="8" width="18" height="1" fill="#FFB060"/>
    
    <!-- 脸部白色区域 -->
    <rect x="9" y="7" width="14" height="8" fill="#FFF8F0"/>
    <rect x="8" y="8" width="16" height="7" fill="#FFF8F0"/>
    
    <!-- 眼睛 -->
    <rect x="11" y="9" width="2" height="2" fill="#201810"/>
    <rect x="19" y="9" width="2" height="2" fill="#201810"/>
    <rect x="11" y="9" width="1" height="1" fill="#FFF"/>
    <rect x="19" y="9" width="1" height="1" fill="#FFF"/>
    
    <!-- 眉毛 -->
    <rect x="10" y="8" width="3" height="1" fill="#FFB060"/>
    <rect x="19" y="8" width="3" height="1" fill="#FFB060"/>
    
    <!-- 鼻子 -->
    <rect x="14" y="12" width="4" height="2" fill="#503020"/>
    <rect x="15" y="12" width="2" height="1" fill="#201810"/>
    
    <!-- 嘴巴 -->
    <rect x="15" y="14" width="2" height="1" fill="#503020"/>
    <rect x="13" y="15" width="6" height="1" fill="#FFF8F0"/>
    <rect x="14" y="15" width="4" height="1" fill="#FF8080"/>
    
    <!-- 腮红 -->
    <rect x="9" y="12" width="1" height="1" fill="#FFA0A0"/>
    <rect x="22" y="12" width="1" height="1" fill="#FFA0A0"/>
    
    <!-- 下巴 -->
    <rect x="8" y="15" width="16" height="2" fill="#FFB060"/>
    <rect x="9" y="17" width="14" height="1" fill="#503020"/>
    <rect x="11" y="18" width="10" height="1" fill="#503020"/>
    <rect x="13" y="19" width="6" height="1" fill="#503020"/>
  </g>
</svg>