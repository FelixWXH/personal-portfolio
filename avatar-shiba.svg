<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <defs>
    <clipPath id="circle">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>
  
  <!-- 粉色圆形背景 -->
  <circle cx="16" cy="16" r="16" fill="#fce7f3"/>
  
  <g>
    <!-- 左耳朵 -->
    <rect x="6" y="4" width="5" height="1" fill="#d97706"/>
    <rect x="5" y="5" width="6" height="1" fill="#f59e0b"/>
    <rect x="5" y="6" width="5" height="1" fill="#fbbf24"/>
    <rect x="6" y="7" width="3" height="1" fill="#fef3c7"/>
    
    <!-- 右耳朵 -->
    <rect x="21" y="4" width="5" height="1" fill="#d97706"/>
    <rect x="21" y="5" width="6" height="1" fill="#f59e0b"/>
    <rect x="22" y="6" width="5" height="1" fill="#fbbf24"/>
    <rect x="23" y="7" width="3" height="1" fill="#fef3c7"/>
    
    <!-- 头顶 -->
    <rect x="11" y="6" width="10" height="1" fill="#d97706"/>
    <rect x="10" y="7" width="12" height="1" fill="#f59e0b"/>
    
    <!-- 脸部橙色毛发 -->
    <rect x="8" y="8" width="16" height="2" fill="#fbbf24"/>
    <rect x="7" y="10" width="18" height="2" fill="#fbbf24"/>
    
    <!-- 脸部白色区域 -->
    <rect x="10" y="10" width="12" height="8" fill="#fffbeb"/>
    <rect x="9" y="11" width="14" height="6" fill="#fffbeb"/>
    <rect x="8" y="12" width="16" height="4" fill="#fffbeb"/>
    
    <!-- 眼睛 - 更大更可爱 -->
    <rect x="10" y="11" width="3" height="3" fill="#1f2937"/>
    <rect x="19" y="11" width="3" height="3" fill="#1f2937"/>
    <!-- 眼睛高光 -->
    <rect x="11" y="11" width="1" height="1" fill="#fff"/>
    <rect x="20" y="11" width="1" height="1" fill="#fff"/>
    
    <!-- 鼻子 -->
    <rect x="14" y="15" width="4" height="2" fill="#78350f"/>
    <rect x="15" y="15" width="2" height="1" fill="#451a03"/>
    
    <!-- 嘴巴 -->
    <rect x="14" y="17" width="4" height="1" fill="#78350f"/>
    <rect x="15" y="17" width="2" height="1" fill="#f87171"/>
    
    <!-- 腮红 - 粉色 -->
    <rect x="8" y="14" width="2" height="1" fill="#fb7185"/>
    <rect x="22" y="14" width="2" height="1" fill="#fb7185"/>
    
    <!-- 下巴 -->
    <rect x="10" y="18" width="12" height="1" fill="#fbbf24"/>
    <rect x="11" y="19" width="10" height="1" fill="#f59e0b"/>
    <rect x="13" y="20" width="6" height="1" fill="#d97706"/>
  </g>
</svg>