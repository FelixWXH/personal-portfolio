<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style 6 - Gradient Modern</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .gradient-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
            animation: bgMove 10s ease-in-out infinite;
        }
        @keyframes bgMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        .content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }
        .badge {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            color: white;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }
        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #06b6d4, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #888;
            font-size: 1.2rem;
            max-width: 500px;
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.05);
        }
        .features {
            display: flex;
            gap: 3rem;
            margin-top: 4rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            text-align: center;
        }
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .feature h3 {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        .feature p {
            color: #666;
            font-size: 0.8rem;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="content">
        <span class="badge">✨ Available for work</span>
        <h1>创造<span class="gradient-text">无限可能</span></h1>
        <p>渐变现代风格，流动的背景动画，简洁有力的大标题，突出核心信息。</p>
        <div class="btn-group">
            <a href="#" class="btn btn-primary">查看作品</a>
            <a href="#" class="btn btn-secondary">了解更多</a>
        </div>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🎨</div>
                <h3>现代设计</h3>
                <p>渐变配色</p>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <h3>流畅动效</h3>
                <p>背景动画</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <h3>响应式</h3>
                <p>全设备适配</p>
            </div>
        </div>
    </div>
</body>
</html>
