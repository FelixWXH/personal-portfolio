<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style 7 - Brutalist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
            background: #f0f0f0;
            color: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            padding: 3rem;
            max-width: 800px;
        }
        h1 {
            font-size: 8rem;
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -4px;
            margin-bottom: 2rem;
        }
        .highlight {
            background: #ff0;
            padding: 0 0.5rem;
            display: inline-block;
        }
        .box {
            border: 4px solid #000;
            padding: 2rem;
            margin: 2rem 0;
            background: #fff;
        }
        .box p {
            font-size: 1.2rem;
            line-height: 1.6;
            font-family: 'Courier New', monospace;
        }
        .nav {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .nav a {
            padding: 1rem 2rem;
            background: #000;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .nav a:hover {
            background: #ff0;
            color: #000;
        }
        .divider {
            width: 100%;
            height: 4px;
            background: #000;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BRUTAL<br><span class="highlight">IST</span></h1>
        <div class="divider"></div>
        <div class="box">
            <p>原始 · 粗犷 · 反设计美学<br>
            打破常规，回归本质<br>
            不妥协的视觉态度</p>
        </div>
        <div class="nav">
            <a href="#">关于</a>
            <a href="#">作品</a>
            <a href="#">联系</a>
        </div>
    </div>
</body>
</html>
